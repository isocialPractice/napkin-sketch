<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="640" viewBox="0 0 1000 640" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-label="napkin-sketch application screenshot">
  <defs>
    <linearGradient id="stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f6f9"/>
      <stop offset="1" stop-color="#eef2f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1f2328" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- window -->
  <rect x="8" y="8" width="984" height="624" rx="14" fill="#ffffff" filter="url(#shadow)"/>

  <!-- toolbar -->
  <rect x="8" y="8" width="984" height="56" rx="14" fill="#ffffff"/>
  <rect x="8" y="50" width="984" height="14" fill="#ffffff"/>
  <line x1="8" y1="64" x2="992" y2="64" stroke="#e3e8ee"/>

  <!-- tool buttons -->
  <g transform="translate(24,20)">
    <rect width="58" height="32" rx="8" fill="#2660e0"/>
    <text x="29" y="21" fill="#fff" font-size="13" text-anchor="middle">Pen</text>
    <rect x="66" width="74" height="32" rx="8" fill="#f1f4f8"/>
    <text x="103" y="21" fill="#3a4250" font-size="13" text-anchor="middle">Marker</text>
    <rect x="148" width="74" height="32" rx="8" fill="#f1f4f8"/>
    <text x="185" y="21" fill="#3a4250" font-size="13" text-anchor="middle">Eraser</text>
    <rect x="230" width="68" height="32" rx="8" fill="#f1f4f8"/>
    <text x="264" y="21" fill="#3a4250" font-size="13" text-anchor="middle">Select</text>
    <rect x="306" width="58" height="32" rx="8" fill="#f1f4f8"/>
    <text x="335" y="21" fill="#3a4250" font-size="13" text-anchor="middle">Text</text>
  </g>

  <!-- swatches -->
  <g transform="translate(420,28)">
    <circle cx="10" cy="8" r="9" fill="#1f2328"/>
    <circle cx="34" cy="8" r="9" fill="#2660e0"/>
    <circle cx="58" cy="8" r="9" fill="#e5484d"/>
    <circle cx="82" cy="8" r="9" fill="#f08c2e"/>
  </g>

  <!-- right buttons -->
  <g transform="translate(720,20)">
    <rect width="62" height="32" rx="8" fill="#f1f4f8"/>
    <text x="31" y="21" fill="#3a4250" font-size="13" text-anchor="middle">Pages</text>
    <rect x="70" width="56" height="32" rx="8" fill="#f1f4f8"/>
    <text x="98" y="21" fill="#3a4250" font-size="13" text-anchor="middle">Open</text>
    <rect x="134" width="56" height="32" rx="8" fill="#1f8a4c"/>
    <text x="162" y="21" fill="#fff" font-size="13" text-anchor="middle">Save</text>
    <rect x="198" width="56" height="32" rx="8" fill="#f1f4f8"/>
    <text x="226" y="21" fill="#3a4250" font-size="12" text-anchor="middle">Settings</text>
  </g>

  <!-- pages panel -->
  <rect x="8" y="64" width="150" height="528" fill="#fafbfc"/>
  <line x1="158" y1="64" x2="158" y2="592" stroke="#e3e8ee"/>
  <text x="26" y="92" fill="#6b7480" font-size="12" font-weight="600">PAGES</text>
  <g transform="translate(26,104)">
    <rect width="106" height="74" rx="6" fill="#fff" stroke="#2660e0" stroke-width="2"/>
    <path d="M14 52 C30 30 46 64 62 44 S86 34 96 50" fill="none" stroke="#1f2328" stroke-width="3" stroke-linecap="round"/>
    <text x="94" y="68" fill="#6b7480" font-size="10" text-anchor="end">1</text>
  </g>
  <g transform="translate(26,190)">
    <rect width="106" height="74" rx="6" fill="#fff" stroke="#e3e8ee" stroke-width="2"/>
    <circle cx="40" cy="38" r="18" fill="none" stroke="#1f2328" stroke-width="3"/>
    <rect x="62" y="24" width="28" height="28" fill="none" stroke="#e5484d" stroke-width="3"/>
    <text x="94" y="68" fill="#6b7480" font-size="10" text-anchor="end">2</text>
  </g>
  <g transform="translate(26,276)">
    <rect width="106" height="74" rx="6" fill="#fff" stroke="#e3e8ee" stroke-width="2"/>
    <path d="M16 30 L92 30 M16 46 L70 46" stroke="#3a4250" stroke-width="3" stroke-linecap="round"/>
    <text x="94" y="68" fill="#6b7480" font-size="10" text-anchor="end">3</text>
  </g>

  <!-- stage -->
  <rect x="158" y="64" width="834" height="528" fill="url(#stage)"/>

  <!-- paper -->
  <g transform="translate(214,108)" filter="url(#shadow)">
    <rect width="724" height="440" rx="12" fill="#fcfaf5"/>
  </g>

  <!-- sample sketch: title text + sharpened shapes -->
  <g transform="translate(214,108)">
    <text x="48" y="74" fill="#1f2328" font-size="30" font-weight="600" font-family="Comic Sans MS, Segoe UI, sans-serif">project ideas ✦</text>
    <!-- sharpened straight arrow -->
    <path d="M60 150 L300 150" stroke="#1f2328" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M286 138 L302 150 L286 162" stroke="#1f2328" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- sharpened circle -->
    <circle cx="430" cy="200" r="72" fill="none" stroke="#2660e0" stroke-width="4"/>
    <text x="430" y="206" fill="#2660e0" font-size="18" text-anchor="middle">core</text>
    <!-- sharpened box -->
    <rect x="80" y="240" width="180" height="120" rx="6" fill="none" stroke="#1f2328" stroke-width="4"/>
    <text x="170" y="306" fill="#3a4250" font-size="18" text-anchor="middle">CLI + GUI</text>
    <!-- accent underline (marker) -->
    <path d="M330 96 C420 86 520 104 600 92" stroke="#f08c2e" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- connector -->
    <path d="M260 300 C330 300 330 230 358 210" stroke="#6b7480" stroke-width="3" fill="none" stroke-dasharray="2 8" stroke-linecap="round"/>
    <!-- mandala hint (symmetry) -->
    <g transform="translate(600,300)" stroke="#e5484d" stroke-width="3" fill="none" opacity="0.85">
      <path d="M0 -40 C16 -20 16 20 0 40 C-16 20 -16 -20 0 -40"/>
      <path d="M0 -40 C16 -20 16 20 0 40 C-16 20 -16 -20 0 -40" transform="rotate(72)"/>
      <path d="M0 -40 C16 -20 16 20 0 40 C-16 20 -16 -20 0 -40" transform="rotate(144)"/>
      <path d="M0 -40 C16 -20 16 20 0 40 C-16 20 -16 -20 0 -40" transform="rotate(216)"/>
      <path d="M0 -40 C16 -20 16 20 0 40 C-16 20 -16 -20 0 -40" transform="rotate(288)"/>
    </g>
  </g>

  <!-- settings panel floating -->
  <g transform="translate(744,80)">
    <rect width="220" height="196" rx="10" fill="#ffffff" stroke="#e3e8ee" filter="url(#shadow)"/>
    <text x="16" y="28" fill="#1f2328" font-size="13" font-weight="600">Auto-sharpen settings</text>
    <text x="16" y="58" fill="#6b7480" font-size="12">Live sharpen</text>
    <rect x="160" y="48" width="44" height="20" rx="10" fill="#cdd5de"/>
    <circle cx="172" cy="58" r="8" fill="#fff"/>
    <text x="16" y="90" fill="#6b7480" font-size="12">Wobble</text>
    <rect x="16" y="98" width="188" height="4" rx="2" fill="#e3e8ee"/><circle cx="80" cy="100" r="7" fill="#2660e0"/>
    <text x="16" y="128" fill="#6b7480" font-size="12">Smoothing</text>
    <rect x="16" y="136" width="188" height="4" rx="2" fill="#e3e8ee"/><circle cx="120" cy="138" r="7" fill="#2660e0"/>
    <text x="16" y="166" fill="#6b7480" font-size="12">Symmetry <tspan fill="#1f2328">5</tspan></text>
    <rect x="16" y="174" width="188" height="4" rx="2" fill="#e3e8ee"/><circle cx="100" cy="176" r="7" fill="#2660e0"/>
  </g>

  <!-- status bar -->
  <line x1="8" y1="592" x2="992" y2="592" stroke="#e3e8ee"/>
  <text x="28" y="614" fill="#1f2328" font-size="13" font-weight="600">project-ideas</text>
  <text x="150" y="614" fill="#1f8a4c" font-size="12">Saved</text>
  <text x="900" y="614" fill="#6b7480" font-size="12" text-anchor="end">Page 1 / 3</text>
</svg>
